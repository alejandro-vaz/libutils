[workspace]
resolver = "3"
members = [
    ".main", 
    "array", 
    "bytediff", 
    "cagelock", 
    "console", 
    "constrangeiter", 
    "ebnftobnf",
    "issue", 
    "report", 
    "terminal"
]
default-members = [".main"]

[workspace.package]
edition = "2024"
rust-version = "1.99"
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
license = "MIT"
authors = ["Alejandro Vaz <alejandro.vaz.myt@gmail.com>"]

[workspace.dependencies]
bytediff = {version = "0.0", path = "bytediff"}
cagelock = {version = "0.0", path = "cagelock"}
constrangeiter = {version = "0.0", path = "constrangeiter"}
ebnftobnf = {version = "0.0", path = "ebnftobnf"}
libutils-array = {version = "0.5", path = "array"}
libutils-console = {version = "2.1", path = "console"}
libutils-issue = {version = "0.1", path = "issue"}
libutils-report = {version = "0.2", path = "report"}
libutils-terminal = {version = "1.1", path = "terminal"}

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3