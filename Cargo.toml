[workspace]
resolver = "3"
members = ["libutils", "array", "cage", "diff", "issue", "log", "pointer", "problem", "report", "terminal"]
default-members = ["libutils"]

[workspace.package]
edition = "2024"
version = "9.36.26"
# number of features - number of .rs files exc. ./libutils/lib.rs - incremental nubmer
rust-version = "1.98"
publish = false
categories = ["development-tools", "config", "no-std"]
keywords = ["utilities", "types", "utils", "libutils"]
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
license = "MIT"
authors = ["Alejandro Vaz"]