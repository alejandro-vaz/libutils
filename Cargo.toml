[package]
name = "libutils"
version = "5.26.14"
edition = "2024"
rust-version = "1.98"
description = "Common library types for faster development"
license = "MIT"

[dev-dependencies]
criterion = "0.8.2"

[lib]
path = "lib.rs"

[[bench]]
name = "array"
harness = false

[[bench]]
name = "cage"
harness = false

[[bench]]
name = "report"
harness = false

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3

[features]
default = ["array", "cage", "report", "terminal"]
array = []
cage = []
report = ["terminal"]
terminal = ["cage", "report"]