[package]
name = "libutils"
version = "5.27.17"
edition = "2024"
authors = ["Alejandro Vaz"]
rust-version = "1.98"
description = "Common library types for faster development"
license = "MIT"
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
keywords = ["utilities", "types", "utils", "libutils"]
categories = ["development-tools", "config", "no-std"]
resolver = "3"

[dev-dependencies]
criterion = "0.8.2"

[lib]
path = "lib.rs"
doctest = false

[[bench]]
name = "array"
harness = false

[[bench]]
name = "cage"
harness = false

[[bench]]
name = "report"
harness = false

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3

[features]
default = ["array", "cage", "report", "terminal"]
array = []
cage = []
report = ["terminal"]
terminal = ["cage", "report"]