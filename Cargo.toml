[workspace]
resolver = "3"
members = [
    ".main", 
    "active-reporting", 
    "bytediff", 
    "cagelock", 
    "libutils-console", 
    "constrangeiter", 
    "ebnftobnf",
    "issuing", 
    "stack-array", 
    "libutils-terminal"
]
default-members = [".main"]

[workspace.package]
edition = "2024"
rust-version = "1.99"
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
license = "MIT"
authors = ["Alejandro Vaz <alejandro.vaz.myt@gmail.com>"]

[workspace.dependencies]
active-reporting = {version = "0.0", path = "active-reporting"}
bytediff = {version = "0.0", path = "bytediff"}
cagelock = {version = "0.0", path = "cagelock"}
constrangeiter = {version = "0.0", path = "constrangeiter"}
ebnftobnf = {version = "0.0", path = "ebnftobnf"}
issuing = {version = "0.0", path = "issuing"}
libutils-console = {version = "2.2", path = "libutils-console"}
libutils-terminal = {version = "1.2", path = "libutils-terminal"}
stack-array = {version = "0.6", path = "stack-array"}

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3