[workspace]
resolver = "3"
members = [".main", "array", "cage", "console", "constrangeiter", "diff", "issue", "report", "terminal"]
default-members = [".main"]

[workspace.package]
edition = "2024"
rust-version = "1.98"
categories = ["development-tools", "config", "no-std"]
keywords = ["utilities", "types", "utils", "libutils"]
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
license = "MIT"
authors = ["Alejandro Vaz <alejandro.vaz.myt@gmail.com>"]

[workspace.dependencies]
libutils-array = {version = "=0.2.2", path = "array"}
libutils-cage = {version = "=0.0.5", path = "cage"}
libutils-console = {version = "=2.0.1", path = "console"}
libutils-constrangeiter = {version = "=0.0.1", path = "constrangeiter"}
libutils-diff = {version = "=0.0.4", path = "diff"}
libutils-issue = {version = "=0.1.1", path = "issue"}
libutils-report = {version = "=0.2.3", path = "report"}
libutils-terminal = {version = "=1.0.1", path = "terminal"}

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3