[package]
name = "libutils"
version = "3.7.11"
edition = "2024"
description = "Common library types for faster development"
license = "MIT"

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "cage"
harness = false

[[bench]]
name = "report"
harness = false

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3

[features]
default = ["cage", "report"]
cage = []
report = []