[workspace]
resolver = "3"
members = [".main", "array", "cage", "diff", "issue", "pointer", "report", "terminal", "threat"]
default-members = [".main"]

[workspace.package]
edition = "2024"
version = "9.23.33"
# number of features - number of lines in cargo tree with grep . --count - incremental number
rust-version = "1.98"
categories = ["development-tools", "config", "no-std"]
keywords = ["utilities", "types", "utils", "libutils"]
homepage = "https://github.com/alejandro-vaz/libutils"
repository = "https://github.com/alejandro-vaz/libutils"
license = "MIT"
authors = ["Alejandro Vaz"]

[workspace.dependencies]
libutils-array = {version = "=9.23.33", path = "array"}
libutils-cage = {version = "=9.23.33", path = "cage"}
libutils-console = {version = "=9.23.33", path = "console"}
libutils-diff = {version = "=9.23.33", path = "diff"}
libutils-issue = {version = "=9.23.33", path = "issue"}
libutils-pointer = {version = "=9.23.33", path = "pointer"}
libutils-report = {version = "=9.23.33", path = "report"}
libutils-terminal = {version = "=9.23.33", path = "terminal"}
libutils-threat = {version = "=9.23.33", path = "threat"}

[profile.bench]
lto = "fat"
opt-level = 3
strip = true
debug = false
codegen-units = 1

[profile.release]
opt-level = 3